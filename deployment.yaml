apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops
  template:
    metadata:
      labels:
        app: devops
    spec:
      containers:
      - name: devops-container
        image: YOUR_DOCKERHUB_USERNAME/devops-exam:FA23-BCS-078
        ports:
        - containerPort: 3000
